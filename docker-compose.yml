name: locallife-os

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      LOCALLIFE_ENV: development
      LOCALLIFE_HOST: 0.0.0.0
      LOCALLIFE_CONTAINER_MODE: "true"
      LOCALLIFE_PORT: 8000
      LOCALLIFE_DATA_DIR: /workspace/data
      LOCALLIFE_DATABASE_URL: sqlite:////workspace/data/locallife.db
      LOCALLIFE_ATTACHMENTS_DIR: /workspace/data/attachments
      LOCALLIFE_BACKUPS_DIR: /workspace/data/backups
      LOCALLIFE_IMPORTS_DIR: /workspace/data/imports
      LOCALLIFE_RUNTIME_DIR: /workspace/data/runtime
      LOCALLIFE_CORS_ORIGINS: '["http://127.0.0.1:3000","http://localhost:3000"]'
      LOCALLIFE_DEFAULT_TIMEZONE: UTC
      LOCALLIFE_TELEMETRY_ENABLED: "false"
      LOCALLIFE_EXTERNAL_REQUESTS_ENABLED: "false"
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - locallife_data:/workspace/data
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=2).read()"
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      api:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000/api/v1
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1))"
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 15s

volumes:
  locallife_data:
    name: locallife-os-data
